<!-- Background Image Container with Modern Edit -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/40 to-transparent z-10"></div>
<img class="w-full h-full object-cover grayscale brightness-[0.4] contrast-[1.2]" data-alt="A high-contrast, professional studio photograph of a traditional Kora and Djembe set against a deep black background. The instruments are treated with a modern edit featuring subtle emerald green rim lighting. The composition is artistic and minimalist, evoking a premium dark-gallery aesthetic with rich textures and deep shadows, emphasizing the cultural heritage of African music." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWrNBDzsGwiW7trD5AM239GOxjzTSFFuKnoWVc_U2hbFdCQ6Ac--2_IbIwQBUjQedtsbIrunIKbqPhTvqmSMF5v0XLjEK9G4JfFUIljT-coAaT_1jHCv7txGN59mY0KClYqVqSsZaVzU80FKUu-2UJygaX1YOe2tiEp8vberHOuKcKaUUGu9io9QrUqixyGYGTkBvni86KDmGQGAmTbj7CfuPlzQ1MZv4masJS-1xNRn_8NI4UVZiCjmxP7eeTJARBQ0dXj8G6_Rgz"/>

</div>
<!-- Content Section -->
<section class="relative z-20 px-margin-mobile pb-xl flex flex-col items-center text-center max-w-lg mx-auto">
<!-- Animated Shader Element (Micro-interaction) -->
<div class="mb-lg w-24 h-1 bg-primary-fixed-dim/30 rounded-full overflow-hidden">
<div class="h-full bg-primary-fixed-dim w-1/3 animate-[loading_2s_ease-in-out_infinite]"></div>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-base">
                Votre héritage, votre rythme.
            </h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl leading-relaxed">
                Découvrez une expérience sonore où la tradition rencontre l'innovation. Plongez dans les profondeurs de l'Amapiano et de l'Afrobeats.
            </p>
<!-- Navigation Actions -->
<div class="w-full flex flex-col gap-gutter mb-xl">

                    Suivant

</button>

<div class="h-[3px] w-4 bg-surface-container-highest rounded-full"></div>

<style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Responsive adjustments for desktop */
        @media (min-width: 768px) {
            h2 {
                font-size: 40px !important;
                line-height: 48px !important;
            }
            .px-margin-mobile {
                padding-left: 48px;
                padding-right: 48px;
            }
        }
    </style>
<script>
        // Micro-interaction for the button
        const nextBtn = document.querySelector('button');
        nextBtn.addEventListener('click', () => {
            // Simulated transition effect
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease-out';
            setTimeout(() => {
                // In a real app, this would navigate to step 2
                document.body.style.opacity = '1';
            }, 500);
        });

        // Subtle parallax effect on background image
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            const img = document.querySelector('img');
            img.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
            img.style.transition = 'transform 0.2s ease-out';
        });
    </script>
