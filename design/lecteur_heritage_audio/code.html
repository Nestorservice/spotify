<body class="bg-background text-on-background selection:bg-primary-fixed-dim selection:text-on-primary-fixed min-h-screen flex flex-col items-center justify-between overflow-hidden relative">
<!-- Background Tribal Motif Overlay -->
<div class="absolute inset-0 tribal-overlay opacity-10 pointer-events-none"></div>
<!-- Header / Top Bar -->
<header class="w-full flex justify-between items-center px-margin-mobile pt-lg z-10">
<button aria-label="Close Player" class="p-2 hover:opacity-80 transition-opacity active:scale-95 duration-100">
<span class="material-symbols-outlined text-on-surface text-headline-md">expand_more</span>
</button>
<div class="flex flex-col items-center">
<span class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-widest">Now Playing</span>
<span class="font-label-lg text-label-lg text-primary-fixed-dim">Sauti Originals</span>
</div>
<button aria-label="More Options" class="p-2 hover:opacity-80 transition-opacity active:scale-95 duration-100">
<span class="material-symbols-outlined text-on-surface text-headline-md">more_vert</span>
</button>
</header>
<!-- Main Content Area: Album Art -->
<main class="flex-1 w-full flex flex-col justify-center items-center px-margin-mobile z-10 py-lg">
<div class="w-full max-w-md aspect-square relative group">
<div class="absolute inset-0 bg-primary-fixed-dim/10 rounded-xl blur-3xl opacity-30 group-hover:opacity-50 transition-opacity duration-700"></div>
<img alt="Album Cover" class="w-full h-full object-cover rounded-xl album-shadow relative z-10 border border-white/5" data-alt="A high-contrast album cover for a contemporary Afro-electronic music artist. The design features a bold, stylized portrait of a figure wearing traditional West African beadwork merged with futuristic holographic elements. The color palette is dominated by deep obsidian blacks, electric emerald greens, and warm saffron yellow highlights. The lighting is dramatic and cinematic, emphasizing the fusion of ancient culture and cutting-edge digital soundscapes in a minimalist dark-gallery aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAkSgGifsyEsyRrmfBgySl_eW3ylsZfMpuU3eA1-RPFnNH6z9WZgSrTKtYqvlosq2FyQxoiRTmK93bA0gISUqinr-FbWxwdQhyPSyrJJdDI2aDFQTEdY4U6ZmuSRYJQsTNB1bodcZXRAJFCZ6mYEupW_xAGYfm_ZutnFw1WYeOgLOVQcgtZzli2yhE5eQPbCEsQLQNOzcTe8Q9wNH9a-vvcmIEh6XA2wUBd5qMjT6pT05mIQqWnzAwBGpvxc-51GD8uh59pWKl_asoy"/>
</div>
<!-- Song Details -->
<div class="w-full max-w-md mt-lg text-left">
<div class="flex justify-between items-center">
<div class="space-y-1">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">Kula Spirits</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Nomadic Rhythms feat. Zari</p>
</div>
<button class="p-2 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-headline-md text-primary-fixed-dim" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
</div>
</div>
<!-- Minimalist Progress Bar -->
<div class="w-full max-w-md mt-lg space-y-base">
<div class="relative w-full h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="absolute h-full bg-primary-fixed-dim w-1/3 rounded-full transition-all duration-300" id="progress-bar"></div>
</div>
<div class="flex justify-between font-label-sm text-label-sm text-on-surface-variant">
<span>1:24</span>
<span>4:15</span>
</div>
</div>
<!-- Vector Controls -->
<div class="w-full max-w-md flex justify-between items-center mt-lg px-4">
<button class="text-on-surface-variant hover:text-primary-fixed transition-colors active:scale-90">
<span class="material-symbols-outlined text-headline-md">shuffle</span>
</button>
<button class="text-on-surface hover:text-primary-fixed-dim transition-colors active:scale-90">
<span class="material-symbols-outlined text-display-lg" style="font-size: 40px;">skip_previous</span>
</button>
<!-- Play Button (Saffron Accent) -->
<button class="w-20 h-20 rounded-full bg-tertiary-fixed-dim flex items-center justify-center text-on-tertiary-fixed active:scale-95 transition-all shadow-lg hover:shadow-tertiary-fixed-dim/20">
<span class="material-symbols-outlined text-display-lg translate-x-1" style="font-variation-settings: 'FILL' 1; font-size: 48px;">play_arrow</span>
</button>
<button class="text-on-surface hover:text-primary-fixed-dim transition-colors active:scale-90">
<span class="material-symbols-outlined text-display-lg" style="font-size: 40px;">skip_next</span>
</button>
<button class="text-on-surface-variant hover:text-primary-fixed transition-colors active:scale-90">
<span class="material-symbols-outlined text-headline-md">repeat</span>
</button>
</div>
</main>
<!-- Bottom Actions / Floating Bar -->
<footer class="w-full px-margin-mobile pb-xl z-10">
<div class="max-w-md mx-auto flex justify-between items-center text-on-surface-variant">
<button class="flex items-center gap-2 font-label-lg text-label-lg hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-body-lg">devices</span>
<span>AirPods Pro</span>
</button>
<div class="flex gap-lg">
<button class="hover:text-on-surface transition-colors active:scale-90">
<span class="material-symbols-outlined text-headline-md">share</span>
</button>
<button class="hover:text-on-surface transition-colors active:scale-90">
<span class="material-symbols-outlined text-headline-md">playlist_play</span>
</button>
</div>
</div>
</footer>
<script>
        // Micro-interaction for the progress bar
        const progressBar = document.getElementById('progress-bar');
        let width = 33;
        setInterval(() => {
            if (width < 100) {
                width += 0.1;
                progressBar.style.width = width + '%';
            }
        }, 1000);

        // Simple button active states toggle for icons like shuffle/repeat
        document.querySelectorAll('.material-symbols-outlined').forEach(icon => {
            icon.parentElement.addEventListener('click', function() {
                if(this.classList.contains('text-primary-fixed')) {
                    this.classList.remove('text-primary-fixed');
                    this.classList.add('text-on-surface-variant');
                } else if(this.classList.contains('text-on-surface-variant')) {
                    this.classList.add('text-primary-fixed');
                    this.classList.remove('text-on-surface-variant');
                }
            });
        });
    </script>
</body></html>
