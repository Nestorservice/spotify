<style>
        body {
            background-color: #000000;
            overflow: hidden;
            margin: 0;
        }

        .tribal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.05;
            background-image: url("https://www.transparenttextures.com/patterns/az-subtle.png");
            background-repeat: repeat;
            pointer-events: none;
        }

        .logo-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .logo-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 228, 118, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: 5;
            animation: pulse-glow 4s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .fade-in-up {
            animation: fadeInUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); letter-spacing: 0.1em; }
            100% { opacity: 1; transform: translateY(0); letter-spacing: -0.02em; }
        }

        .loading-line {
            width: 0%;
            height: 1.5px;
            background-color: #00e476;
            margin-top: 24px;
            animation: grow-line 2.5s ease-in-out forwards;
        }

        @keyframes grow-line {
            0% { width: 0; opacity: 0; }
            20% { opacity: 1; }
            100% { width: 120px; opacity: 0.5; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="dark font-body-md text-on-background">
<!-- Subtle Tribal Background Texture -->
<div class="tribal-overlay"></div>
<!-- Background Shader Animation (Ambient) -->

<main class="logo-container">
<!-- Radial glow behind logo -->
<div class="logo-glow"></div>
<div class="flex flex-col items-center">
<!-- Brand Logo -->
<h1 class="fade-in-up font-display-lg text-display-lg text-primary-fixed-dim tracking-tighter cursor-default select-none">
                Sauti
            </h1>
<!-- Loading Indicator (Purely Aesthetic for Splash) -->
<div class="loading-line"></div>
<!-- Tagline -->
<p class="mt-base font-label-lg text-label-lg text-on-surface-variant opacity-40 uppercase tracking-[0.2em] fade-in-up" style="animation-delay: 0.3s;">
                Heritage Audio
            </p>
</div>
</main>
<!-- Interactive Layer for cursor interaction -->
<div class="fixed inset-0 z-20" id="interactive-overlay"></div>
<script>
        // Simple micro-interaction for the splash screen
        const overlay = document.getElementById('interactive-overlay');
        const logo = document.querySelector('h1');

        overlay.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            
            logo.style.transform = `translate(${x}px, ${y}px)`;
            logo.style.textShadow = `${-x}px ${-y}px 15px rgba(0, 228, 118, 0.2)`;
        });

        overlay.addEventListener('mouseleave', () => {
            logo.style.transform = `translate(0, 0)`;
            logo.style.textShadow = `none`;
        });

        // Suppression Logic Check:
        // As a splash screen, it is a transactional/focused linear journey.
        // Therefore, we do not render TopAppBar or BottomNavBar.
    </script>
</body></html>
