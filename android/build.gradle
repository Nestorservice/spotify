// Top-level build file where you can add configuration options common to all sub-projects/modules.

ext {
    buildToolsVersion = "34.0.0"
    minSdkVersion = 24
    compileSdkVersion = 34
    targetSdkVersion = 34
    ndkVersion = "27.1.12297006"
    // Downgrade à 1.8.21 pour corriger l'erreur 'Bundle?' attendu 'Bundle'
    kotlinVersion = "1.8.21"
}

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        // Utilisation de la version 1.8.21 ici aussi
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.21")
        classpath("com.google.gms:google-services:4.4.0")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.facebook.react.rootproject"

// Configuration pour assouplir les règles du compilateur Kotlin
tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    kotlinOptions {
        freeCompilerArgs += ["-Xskip-prerelease-check", "-Xallow-no-source-files"]
        suppressWarnings = true
    }
}