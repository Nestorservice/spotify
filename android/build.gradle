// Top-level build file where you can add configuration options common to all sub-projects/modules.

ext {
    buildToolsVersion = "34.0.0"
    minSdkVersion = 24
    compileSdkVersion = 34
    targetSdkVersion = 34
    ndkVersion = "27.1.12297006"
    kotlinVersion = "1.9.24" // Corrigé : Rétrogradé de 2.1.20 pour assurer la compatibilité avec les dépendances
}

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.0")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.facebook.react.rootproject"

// Force toutes les dépendances tierces (comme react-native-track-player) à utiliser la version Kotlin 1.9.24
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.ext {
                kotlinVersion = "1.9.24"
            }
        }
    }
}
